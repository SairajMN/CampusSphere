kind = "mobile"
previewPath = "/"
title = "Campus Event Manager"
version = "1.0.0"
id = "artifacts/campus-events"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20392

[services.development]
run = "pnpm --filter @workspace/campus-events run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/campus-events", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/campus-events", "run", "serve" ]

[services.env]
PORT = "20392"
BASE_PATH = "/"
